    <rect x="759" y="226" width="50" height="6" rx="3" fill="#2f3549"/>
    <rect x="726" y="112" width="116" height="94" rx="8" fill="#16161e" stroke="#3b4261" stroke-width="1.5"/>
    <circle cx="736" cy="122" r="2" fill="#f7768e"/>
    <circle cx="743" cy="122" r="2" fill="#e0af68"/>
    <circle cx="750" cy="122" r="2" fill="#9ece6a"/>
    <g>
      <rect x="736" y="132" height="4.5" rx="2.25" fill="#7dcfff" width="0">
        <animate attributeName="width" values="0;0;60;60;0;0" keyTimes="0;0.04;0.16;0.90;0.94;1" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </rect>
      <rect x="746" y="144" height="4.5" rx="2.25" fill="#bb9af7" width="0">
        <animate attributeName="width" values="0;0;80;80;0;0" keyTimes="0;0.18;0.32;0.90;0.94;1" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </rect>
      <rect x="746" y="156" height="4.5" rx="2.25" fill="#e0af68" width="0">
        <animate attributeName="width" values="0;0;48;48;0;0" keyTimes="0;0.34;0.46;0.90;0.94;1" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </rect>
      <rect x="736" y="168" height="4.5" rx="2.25" fill="#9ece6a" width="0">
        <animate attributeName="width" values="0;0;68;68;0;0" keyTimes="0;0.48;0.62;0.90;0.94;1" dur="8s" begin="-2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- right monitor -->
