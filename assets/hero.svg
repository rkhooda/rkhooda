<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" width="1200" height="330" role="img" aria-label="Rakshit Hooda — full-stack developer, jack of too many trades">
  <title>Rakshit Hooda — coding at night, vibing to music</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14141b"/>
      <stop offset="0.55" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#1e2233"/>
    </linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="600" y2="0" spreadMethod="repeat">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.33" stop-color="#bb9af7"/>
      <stop offset="0.66" stop-color="#7dcfff"/>
      <stop offset="1" stop-color="#7aa2f7"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="600 0" dur="11s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="moonhalo">
      <stop offset="0" stop-color="#c0caf5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c0caf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenhalo">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="card">
      <rect x="0" y="0" width="1200" height="330" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- night sky -->
    <rect width="1200" height="330" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#c0caf5">
      <circle cx="90"  cy="34"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" begin="-0.4s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="72"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.5s" begin="-1.1s" repeatCount="indefinite"/></circle>
      <circle cx="230" cy="28"  r="1.6"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.8s" begin="-2.0s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="58"  r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.9s" begin="-0.7s" repeatCount="indefinite"/></circle>
      <circle cx="410" cy="30"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.4s" begin="-1.6s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="84"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.6s" begin="-2.2s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="34"  r="1.3"><animate attributeName="opacity" values="0.15;1;0.15" dur="4.1s" begin="-0.2s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="30"  r="1.5"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.0s" begin="-1.4s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="88"  r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.7s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="40"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.6s" begin="-2.6s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="64"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.4s" begin="-0.5s" repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="26" r="1.5"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.3s" begin="-1.8s" repeatCount="indefinite"/></circle>
      <circle cx="1090" cy="52" r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.8s" begin="-1.0s" repeatCount="indefinite"/></circle>
      <circle cx="1150" cy="30" r="1.6"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.9s" begin="-0.3s" repeatCount="indefinite"/></circle>
      <circle cx="660" cy="110" r="1.0"><animate attributeName="opacity" values="0.2;0.7;0.2"  dur="2.5s" begin="-1.9s" repeatCount="indefinite"/></circle>
      <circle cx="240" cy="96"  r="1.0"><animate attributeName="opacity" values="0.2;0.7;0.2"  dur="3.2s" begin="-2.4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- shooting star -->
    <g opacity="0">
