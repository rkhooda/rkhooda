    <rect x="1083" y="226" width="50" height="6" rx="3" fill="#2f3549"/>
    <rect x="1050" y="112" width="116" height="94" rx="8" fill="#16161e" stroke="#3b4261" stroke-width="1.5"/>
    <circle cx="1060" cy="122" r="2" fill="#f7768e"/>
    <circle cx="1067" cy="122" r="2" fill="#e0af68"/>
    <circle cx="1074" cy="122" r="2" fill="#9ece6a"/>
    <g>
      <rect x="1060" y="132" height="4.5" rx="2.25" fill="#9ece6a" width="0">
        <animate attributeName="width" values="0;0;70;70;0;0" keyTimes="0;0.04;0.16;0.90;0.94;1" dur="8.5s" begin="-5s" repeatCount="indefinite"/>
      </rect>
      <rect x="1070" y="144" height="4.5" rx="2.25" fill="#7aa2f7" width="0">
        <animate attributeName="width" values="0;0;52;52;0;0" keyTimes="0;0.18;0.32;0.90;0.94;1" dur="8.5s" begin="-5s" repeatCount="indefinite"/>
