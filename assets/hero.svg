    <rect x="668" y="232" width="500" height="2.5" rx="1.25" fill="#3b4261"/>
    <rect x="684"  y="242" width="8" height="60" fill="#242940"/>
    <rect x="1146" y="242" width="8" height="60" fill="#242940"/>

    <!-- plant -->
    <path d="M676,232 L702,232 L698,210 L680,210 Z" fill="#414868"/>
    <path d="M689,210 C689,196 682,192 676,186 C684,186 690,194 690,202 Z" fill="#9ece6a"/>
    <path d="M689,210 C689,194 696,190 703,185 C696,184 688,192 688,201 Z" fill="#73daca"/>
    <path d="M689,210 C687,198 689,188 689,180" stroke="#9ece6a" stroke-width="2.4" fill="none" stroke-linecap="round">
