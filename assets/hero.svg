    <path d="M726,212 a6.5,6.5 0 0 1 0,13" stroke="#f7768e" stroke-width="3.5" fill="none"/>
    <g stroke="#9aa5ce" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M707,200 q4,-8 0,-14 q-4,-6 2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="3.4s" begin="-0.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.65;0" dur="3.4s" begin="-0.0s" repeatCount="indefinite"/>
      </path>
      <path d="M714,200 q-4,-8 0,-14 q4,-6 -2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="3.4s" begin="-1.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="3.4s" begin="-1.1s" repeatCount="indefinite"/>
      </path>
      <path d="M721,200 q4,-8 0,-14 q-4,-6 2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="3.4s" begin="-2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.55;0" dur="3.4s" begin="-2.2s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- person, seen from behind -->
