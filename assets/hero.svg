      <animate attributeName="opacity" values="0;0.9;0;0" keyTimes="0;0.05;0.12;1" dur="9s" begin="-3s" repeatCount="indefinite"/>
      <animateMotion path="M150,24 L470,92" keyPoints="0;1;1" keyTimes="0;0.12;1" calcMode="linear" dur="9s" begin="-3s" repeatCount="indefinite"/>
    </g>

    <!-- moon -->
    <circle cx="600" cy="62" r="52" fill="url(#moonhalo)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="62" r="20" fill="#e2e7ff"/>
    <circle cx="594" cy="56" r="3"   fill="#a9b1d6" opacity="0.35"/>
    <circle cx="606" cy="68" r="2.4" fill="#a9b1d6" opacity="0.3"/>
    <circle cx="597" cy="66" r="1.6" fill="#a9b1d6" opacity="0.3"/>

    <!-- ═══ left column: name ═══ -->
    <text x="72" y="152" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="800" fill="#7aa2f7" opacity="0.4" filter="url(#soft)">Rakshit Hooda</text>
    <text x="72" y="152" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="800" fill="url(#shine)">Rakshit Hooda</text>

    <text x="74" y="190" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="6" fill="#9aa5ce">JACK OF TOO MANY TRADES</text>

    <!-- mini equalizer + caption -->
    <g>
      <rect x="74"  width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="6;22;10;24;6"  dur="1.8s"  begin="-0.0s" repeatCount="indefinite"/><animate attributeName="y" values="234;218;230;216;234" dur="1.8s"  begin="-0.0s" repeatCount="indefinite"/></rect>
      <rect x="82"  width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="10;24;8;20;10" dur="1.94s" begin="-0.26s" repeatCount="indefinite"/><animate attributeName="y" values="230;216;232;220;230" dur="1.94s" begin="-0.26s" repeatCount="indefinite"/></rect>
      <rect x="90"  width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="14;6;22;12;14" dur="2.08s" begin="-0.52s" repeatCount="indefinite"/><animate attributeName="y" values="226;234;218;228;226" dur="2.08s" begin="-0.52s" repeatCount="indefinite"/></rect>
      <rect x="98"  width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="8;20;12;24;8"  dur="1.84s" begin="-0.78s" repeatCount="indefinite"/><animate attributeName="y" values="232;220;228;216;232" dur="1.84s" begin="-0.78s" repeatCount="indefinite"/></rect>
      <rect x="106" width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="18;8;24;10;18" dur="2.0s"  begin="-1.04s" repeatCount="indefinite"/><animate attributeName="y" values="222;232;216;230;222" dur="2.0s"  begin="-1.04s" repeatCount="indefinite"/></rect>
      <rect x="114" width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="6;18;10;22;6"  dur="1.9s"  begin="-1.3s" repeatCount="indefinite"/><animate attributeName="y" values="234;222;230;218;234" dur="1.9s"  begin="-1.3s" repeatCount="indefinite"/></rect>
      <rect x="122" width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="12;24;8;18;12" dur="2.14s" begin="-1.56s" repeatCount="indefinite"/><animate attributeName="y" values="228;216;232;222;228" dur="2.14s" begin="-1.56s" repeatCount="indefinite"/></rect>
      <rect x="130" width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="16;8;20;12;16" dur="1.8s"  begin="-1.82s" repeatCount="indefinite"/><animate attributeName="y" values="224;232;220;228;224" dur="1.8s"  begin="-1.82s" repeatCount="indefinite"/></rect>
      <rect x="138" width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="8;22;14;24;8"  dur="2.04s" begin="-2.08s" repeatCount="indefinite"/><animate attributeName="y" values="232;218;226;216;232" dur="2.04s" begin="-2.08s" repeatCount="indefinite"/></rect>
    </g>
    <text x="162" y="234" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace" font-size="13" fill="#565f89">// lofi beats to build to ♪</text>

