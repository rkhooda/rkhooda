      <!-- torso -->
      <rect x="912" y="172" width="68" height="74" rx="22" fill="#414868"/>
      <!-- arms reaching toward the desk -->
      <path d="M920,190 Q896,210 882,224" stroke="#414868" stroke-width="9" fill="none" stroke-linecap="round"/>
      <path d="M972,190 Q996,210 1010,224" stroke="#414868" stroke-width="9" fill="none" stroke-linecap="round"/>
      <circle cx="880" cy="226" r="5" fill="#414868">
        <animate attributeName="cy" values="226;224.5;226" dur="0.42s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1012" cy="226" r="5" fill="#414868">
        <animate attributeName="cy" values="226;224.5;226" dur="0.38s" begin="-0.2s" repeatCount="indefinite"/>
      </circle>
      <!-- nodding head + headphones, both cups visible -->
      <g>
        <circle cx="946" cy="152" r="18" fill="#4c5479"/>
        <path d="M928,152 A18,18 0 0 1 964,152 Z" fill="#3b4261"/>
        <path d="M929,146 A17.5,17.5 0 0 1 963,146" stroke="#7dcfff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <rect x="920" y="146" width="10" height="16" rx="4.5" fill="#7dcfff">
          <animate attributeName="opacity" values="0.75;1;0.75" dur="2.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="962" y="146" width="10" height="16" rx="4.5" fill="#7dcfff">
          <animate attributeName="opacity" values="0.75;1;0.75" dur="2.6s" begin="-1.3s" repeatCount="indefinite"/>
        </rect>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 2;0 0" dur="1.1s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- floating notes -->
    <g font-family="'Segoe UI',Arial,sans-serif">
      <text x="968" y="134" font-size="18" fill="#bb9af7" opacity="0">♪
        <animateTransform attributeName="transform" type="translate" values="0 0;-8 -30;-18 -62" dur="5s" begin="-0.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.25;1" dur="5s" begin="-0.0s" repeatCount="indefinite"/>
      </text>
      <text x="980" y="144" font-size="15" fill="#7dcfff" opacity="0">♫
        <animateTransform attributeName="transform" type="translate" values="0 0;-4 -34;-10 -66" dur="5s" begin="-1.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.25;1" dur="5s" begin="-1.7s" repeatCount="indefinite"/>
      </text>
      <text x="962" y="126" font-size="13" fill="#7aa2f7" opacity="0">♪
        <animateTransform attributeName="transform" type="translate" values="0 0;-12 -28;-22 -58" dur="5s" begin="-3.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.85;0" keyTimes="0;0.25;1" dur="5s" begin="-3.4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- chair, closest to camera -->
    <rect x="920" y="206" width="52" height="84" rx="12" fill="#2f3549"/>
    <rect x="942" y="288" width="8" height="8" fill="#2f3549"/>
    <line x1="908" y1="296" x2="984" y2="296" stroke="#2f3549" stroke-width="5" stroke-linecap="round"/>
    <circle cx="910" cy="298" r="4" fill="#2f3549"/>
    <circle cx="946" cy="298" r="4" fill="#2f3549"/>
    <circle cx="982" cy="298" r="4" fill="#2f3549"/>

    <!-- animated bottom edge -->
    <rect x="0" y="324" width="1200" height="6" fill="url(#shine)" opacity="0.9"/>
