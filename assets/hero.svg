        <animate attributeName="width" values="0;0;44;44;0;0" keyTimes="0;0.48;0.62;0.90;0.94;1" dur="8.5s" begin="-5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- centre monitor -->
    <rect x="940" y="208" width="12" height="18" fill="#2f3549"/>
    <rect x="916" y="226" width="60" height="6" rx="3" fill="#2f3549"/>
    <rect x="850" y="88" width="192" height="120" rx="9" fill="#16161e" stroke="#3b4261" stroke-width="1.5"/>
    <circle cx="862" cy="100" r="2.5" fill="#f7768e"/>
    <circle cx="870" cy="100" r="2.5" fill="#e0af68"/>
    <circle cx="878" cy="100" r="2.5" fill="#9ece6a"/>

    <!-- code typing itself -->
    <g>
      <rect x="862" y="112" height="5" rx="2.5" fill="#bb9af7" width="0">
        <animate attributeName="width" values="0;0;90;90;0;0"  keyTimes="0;0.02;0.12;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="874" y="126" height="5" rx="2.5" fill="#7dcfff" width="0">
        <animate attributeName="width" values="0;0;118;118;0;0" keyTimes="0;0.14;0.26;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="874" y="140" height="5" rx="2.5" fill="#9ece6a" width="0">
        <animate attributeName="width" values="0;0;70;70;0;0"  keyTimes="0;0.28;0.38;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="886" y="154" height="5" rx="2.5" fill="#7aa2f7" width="0">
        <animate attributeName="width" values="0;0;100;100;0;0" keyTimes="0;0.40;0.52;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="874" y="168" height="5" rx="2.5" fill="#e0af68" width="0">
        <animate attributeName="width" values="0;0;56;56;0;0"  keyTimes="0;0.54;0.63;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="862" y="182" height="5" rx="2.5" fill="#f7768e" width="0">
        <animate attributeName="width" values="0;0;42;42;0;0"  keyTimes="0;0.65;0.72;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="862" y="194" width="7" height="5" rx="1.5" fill="#c0caf5">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
