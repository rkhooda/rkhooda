<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" width="1200" height="330" role="img" aria-label="Rakshit Hooda — full-stack developer, jack of too many trades">
  <title>Rakshit Hooda — coding at night, vibing to music</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14141b"/>
      <stop offset="0.55" stop-color="#1a1b26"/>
      <stop offset="1" stop-color="#1e2233"/>
    </linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="600" y2="0" spreadMethod="repeat">
      <stop offset="0" stop-color="#7aa2f7"/>
      <stop offset="0.33" stop-color="#bb9af7"/>
      <stop offset="0.66" stop-color="#7dcfff"/>
      <stop offset="1" stop-color="#7aa2f7"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="0 0" to="600 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="moonhalo">
      <stop offset="0" stop-color="#c0caf5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c0caf5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenhalo">
      <stop offset="0" stop-color="#7aa2f7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <clipPath id="card">
      <rect x="0" y="0" width="1200" height="330" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- night sky -->
    <rect width="1200" height="330" fill="url(#sky)"/>

    <!-- stars -->
    <g fill="#c0caf5">
      <circle cx="90"  cy="34"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.1s" begin="-0.4s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="72"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.5s" begin="-1.1s" repeatCount="indefinite"/></circle>
      <circle cx="230" cy="28"  r="1.6"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.8s" begin="-2.0s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="58"  r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.9s" begin="-0.7s" repeatCount="indefinite"/></circle>
      <circle cx="410" cy="30"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.4s" begin="-1.6s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="84"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.6s" begin="-2.2s" repeatCount="indefinite"/></circle>
      <circle cx="560" cy="34"  r="1.3"><animate attributeName="opacity" values="0.15;1;0.15" dur="4.1s" begin="-0.2s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="30"  r="1.5"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.0s" begin="-1.4s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="88"  r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.7s" begin="-0.9s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="40"  r="1.4"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.6s" begin="-2.6s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="64"  r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="2.4s" begin="-0.5s" repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="26" r="1.5"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.3s" begin="-1.8s" repeatCount="indefinite"/></circle>
      <circle cx="1090" cy="52" r="1.2"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.8s" begin="-1.0s" repeatCount="indefinite"/></circle>
      <circle cx="1150" cy="30" r="1.6"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.9s" begin="-0.3s" repeatCount="indefinite"/></circle>
      <circle cx="660" cy="110" r="1.0"><animate attributeName="opacity" values="0.2;0.7;0.2"  dur="2.5s" begin="-1.9s" repeatCount="indefinite"/></circle>
      <circle cx="240" cy="96"  r="1.0"><animate attributeName="opacity" values="0.2;0.7;0.2"  dur="3.2s" begin="-2.4s" repeatCount="indefinite"/></circle>
    </g>

    <!-- shooting star -->
    <g opacity="0">
      <line x1="0" y1="0" x2="30" y2="9" stroke="#c0caf5" stroke-width="1.6" stroke-linecap="round"/>
      <animate attributeName="opacity" values="0;0.9;0;0" keyTimes="0;0.05;0.12;1" dur="9s" begin="-3s" repeatCount="indefinite"/>
      <animateMotion path="M150,24 L470,92" keyPoints="0;1;1" keyTimes="0;0.12;1" calcMode="linear" dur="9s" begin="-3s" repeatCount="indefinite"/>
    </g>

    <!-- moon -->
    <circle cx="600" cy="62" r="52" fill="url(#moonhalo)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="62" r="20" fill="#e2e7ff"/>
    <circle cx="594" cy="56" r="3"   fill="#a9b1d6" opacity="0.35"/>
    <circle cx="606" cy="68" r="2.4" fill="#a9b1d6" opacity="0.3"/>
    <circle cx="597" cy="66" r="1.6" fill="#a9b1d6" opacity="0.3"/>

    <!-- ═══ left column: name ═══ -->
    <text x="72" y="152" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="800" fill="#7aa2f7" opacity="0.4" filter="url(#soft)">Rakshit Hooda</text>
    <text x="72" y="152" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="58" font-weight="800" fill="url(#shine)">Rakshit Hooda</text>

    <text x="74" y="190" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="600" letter-spacing="6" fill="#9aa5ce">JACK OF TOO MANY TRADES</text>

    <!-- mini equalizer + caption -->
    <g>
      <rect x="74"  width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="6;22;10;24;6"  dur="0.9s"  begin="-0.0s" repeatCount="indefinite"/><animate attributeName="y" values="234;218;230;216;234" dur="0.9s"  begin="-0.0s" repeatCount="indefinite"/></rect>
      <rect x="82"  width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="10;24;8;20;10" dur="0.97s" begin="-0.13s" repeatCount="indefinite"/><animate attributeName="y" values="230;216;232;220;230" dur="0.97s" begin="-0.13s" repeatCount="indefinite"/></rect>
      <rect x="90"  width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="14;6;22;12;14" dur="1.04s" begin="-0.26s" repeatCount="indefinite"/><animate attributeName="y" values="226;234;218;228;226" dur="1.04s" begin="-0.26s" repeatCount="indefinite"/></rect>
      <rect x="98"  width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="8;20;12;24;8"  dur="0.92s" begin="-0.39s" repeatCount="indefinite"/><animate attributeName="y" values="232;220;228;216;232" dur="0.92s" begin="-0.39s" repeatCount="indefinite"/></rect>
      <rect x="106" width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="18;8;24;10;18" dur="1.0s"  begin="-0.52s" repeatCount="indefinite"/><animate attributeName="y" values="222;232;216;230;222" dur="1.0s"  begin="-0.52s" repeatCount="indefinite"/></rect>
      <rect x="114" width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="6;18;10;22;6"  dur="0.95s" begin="-0.65s" repeatCount="indefinite"/><animate attributeName="y" values="234;222;230;218;234" dur="0.95s" begin="-0.65s" repeatCount="indefinite"/></rect>
      <rect x="122" width="5" rx="2" fill="#7aa2f7"><animate attributeName="height" values="12;24;8;18;12" dur="1.07s" begin="-0.78s" repeatCount="indefinite"/><animate attributeName="y" values="228;216;232;222;228" dur="1.07s" begin="-0.78s" repeatCount="indefinite"/></rect>
      <rect x="130" width="5" rx="2" fill="#bb9af7"><animate attributeName="height" values="16;8;20;12;16" dur="0.9s"  begin="-0.91s" repeatCount="indefinite"/><animate attributeName="y" values="224;232;220;228;224" dur="0.9s"  begin="-0.91s" repeatCount="indefinite"/></rect>
      <rect x="138" width="5" rx="2" fill="#7dcfff"><animate attributeName="height" values="8;22;14;24;8"  dur="1.02s" begin="-1.04s" repeatCount="indefinite"/><animate attributeName="y" values="232;218;226;216;232" dur="1.02s" begin="-1.04s" repeatCount="indefinite"/></rect>
    </g>
    <text x="162" y="234" font-family="'Cascadia Code','Fira Code',Consolas,'Courier New',monospace" font-size="13" fill="#565f89">// lofi beats to build to ♪</text>

    <!-- ═══ right scene: desk setup ═══ -->
    <!-- floor -->
    <line x1="620" y1="302" x2="1200" y2="302" stroke="#24283b" stroke-width="2" opacity="0.7"/>

    <!-- desk -->
    <rect x="664" y="232" width="508" height="10" rx="5" fill="#2a2f45"/>
    <rect x="668" y="232" width="500" height="2.5" rx="1.25" fill="#3b4261"/>
    <rect x="684"  y="242" width="8" height="60" fill="#242940"/>
    <rect x="1146" y="242" width="8" height="60" fill="#242940"/>

    <!-- plant -->
    <path d="M676,232 L702,232 L698,210 L680,210 Z" fill="#414868"/>
    <path d="M689,210 C689,196 682,192 676,186 C684,186 690,194 690,202 Z" fill="#9ece6a"/>
    <path d="M689,210 C689,194 696,190 703,185 C696,184 688,192 688,201 Z" fill="#73daca"/>
    <path d="M689,210 C687,198 689,188 689,180" stroke="#9ece6a" stroke-width="2.4" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" values="-3 689 210;3 689 210;-3 689 210" dur="5s" repeatCount="indefinite"/>
    </path>

    <!-- chair -->
    <rect x="736" y="178" width="10" height="80" rx="5" fill="#2f3549"/>
    <rect x="740" y="254" width="86" height="9" rx="4.5" fill="#2f3549"/>
    <rect x="780" y="262" width="8" height="26" fill="#2f3549"/>
    <line x1="756" y1="296" x2="812" y2="296" stroke="#2f3549" stroke-width="5" stroke-linecap="round"/>
    <circle cx="758" cy="298" r="4" fill="#2f3549"/>
    <circle cx="784" cy="298" r="4" fill="#2f3549"/>
    <circle cx="810" cy="298" r="4" fill="#2f3549"/>

    <!-- person -->
    <g>
      <!-- legs -->
      <path d="M780,252 L830,248 L832,292 L848,292" stroke="#414868" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- torso, leaning toward the screen -->
      <rect x="768" y="182" width="34" height="80" rx="15" fill="#414868" transform="rotate(7 785 222)"/>
      <!-- arm to keyboard -->
      <path d="M784,198 Q812,216 840,224" stroke="#414868" stroke-width="9" fill="none" stroke-linecap="round"/>
      <circle cx="844" cy="225" r="5" fill="#414868"/>
      <!-- nodding head + headphones -->
      <g>
        <circle cx="808" cy="158" r="17" fill="#4c5479"/>
        <path d="M796,144 Q808,132 820,144" stroke="#3b4261" stroke-width="7" fill="none" stroke-linecap="round"/>
        <path d="M791,146 A17.5 17.5 0 0 1 825,146" stroke="#7dcfff" stroke-width="4" fill="none" stroke-linecap="round"/>
        <rect x="817" y="150" width="10" height="16" rx="4.5" fill="#7dcfff">
          <animate attributeName="opacity" values="0.75;1;0.75" dur="1.24s" repeatCount="indefinite"/>
        </rect>
        <animateTransform attributeName="transform" type="translate" values="0 0;0 2.6;0 0" dur="0.62s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- floating notes -->
    <g font-family="'Segoe UI',Arial,sans-serif">
      <text x="828" y="140" font-size="18" fill="#bb9af7" opacity="0">♪
        <animateTransform attributeName="transform" type="translate" values="0 0;-8 -30;-18 -62" dur="3.8s" begin="-0.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.95;0" keyTimes="0;0.25;1" dur="3.8s" begin="-0.0s" repeatCount="indefinite"/>
      </text>
      <text x="840" y="150" font-size="15" fill="#7dcfff" opacity="0">♫
        <animateTransform attributeName="transform" type="translate" values="0 0;-4 -34;-10 -66" dur="3.8s" begin="-1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.25;1" dur="3.8s" begin="-1.3s" repeatCount="indefinite"/>
      </text>
      <text x="822" y="132" font-size="13" fill="#7aa2f7" opacity="0">♪
        <animateTransform attributeName="transform" type="translate" values="0 0;-12 -28;-22 -58" dur="3.8s" begin="-2.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.85;0" keyTimes="0;0.25;1" dur="3.8s" begin="-2.6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- keyboard -->
    <rect x="846" y="224" width="104" height="7" rx="3.5" fill="#2f3549"/>
    <rect x="850" y="224" width="96" height="2" rx="1" fill="#3b4261"/>

    <!-- coffee mug + steam -->
    <rect x="964" y="206" width="26" height="25" rx="3.5" fill="#f7768e"/>
    <path d="M990,212 a6.5,6.5 0 0 1 0,13" stroke="#f7768e" stroke-width="3.5" fill="none"/>
    <g stroke="#9aa5ce" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M971,200 q4,-8 0,-14 q-4,-6 2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="2.6s" begin="-0.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.65;0" dur="2.6s" begin="-0.0s" repeatCount="indefinite"/>
      </path>
      <path d="M978,200 q-4,-8 0,-14 q4,-6 -2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="2.6s" begin="-0.9s" repeatCount="indefinite"/>
      </path>
      <path d="M985,200 q4,-8 0,-14 q-4,-6 2,-12" opacity="0">
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12" dur="2.6s" begin="-1.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.55;0" dur="2.6s" begin="-1.7s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- monitor -->
    <ellipse cx="1081" cy="150" rx="150" ry="110" fill="url(#screenhalo)" opacity="0.35">
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="4.5s" repeatCount="indefinite"/>
    </ellipse>
    <rect x="1064" y="212" width="12" height="18" fill="#2f3549"/>
    <rect x="1040" y="228" width="60" height="6" rx="3" fill="#2f3549"/>
    <rect x="990" y="92" width="182" height="118" rx="9" fill="#16161e" stroke="#3b4261" stroke-width="1.5"/>
    <circle cx="1002" cy="104" r="2.5" fill="#f7768e"/>
    <circle cx="1010" cy="104" r="2.5" fill="#e0af68"/>
    <circle cx="1018" cy="104" r="2.5" fill="#9ece6a"/>

    <!-- code typing itself -->
    <g>
      <rect x="1002" y="116" height="5" rx="2.5" fill="#bb9af7" width="0">
        <animate attributeName="width" values="0;0;90;90;0;0"  keyTimes="0;0.02;0.12;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1014" y="130" height="5" rx="2.5" fill="#7dcfff" width="0">
        <animate attributeName="width" values="0;0;118;118;0;0" keyTimes="0;0.14;0.26;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1014" y="144" height="5" rx="2.5" fill="#9ece6a" width="0">
        <animate attributeName="width" values="0;0;70;70;0;0"  keyTimes="0;0.28;0.38;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1026" y="158" height="5" rx="2.5" fill="#7aa2f7" width="0">
        <animate attributeName="width" values="0;0;100;100;0;0" keyTimes="0;0.40;0.52;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1014" y="172" height="5" rx="2.5" fill="#e0af68" width="0">
        <animate attributeName="width" values="0;0;56;56;0;0"  keyTimes="0;0.54;0.63;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1002" y="186" height="5" rx="2.5" fill="#f7768e" width="0">
        <animate attributeName="width" values="0;0;42;42;0;0"  keyTimes="0;0.65;0.72;0.90;0.94;1" dur="9s" begin="-6.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="1002" y="198" width="7" height="5" rx="1.5" fill="#c0caf5">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- animated bottom edge -->
    <rect x="0" y="324" width="1200" height="6" fill="url(#shine)" opacity="0.9"/>
  </g>

  <!-- card border -->
  <rect x="0.75" y="0.75" width="1198.5" height="328.5" rx="16" fill="none" stroke="#2f3549" stroke-width="1.5"/>
</svg>
